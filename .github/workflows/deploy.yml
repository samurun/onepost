# Deploy to Cloud Run on tag push (e.g. `v1.0.0`).
#
# Required GitHub secrets (under environment `development`):
#   GCP_PROJECT_ID         — e.g. "onepost-prod"
#   GCP_WIF_PROVIDER       — full WIF provider resource name, e.g.
#                            "projects/123456789/locations/global/workloadIdentityPools/github/providers/github"
#   GCP_SA_EMAIL           — deploy service account (Cloud Run Admin + Artifact Registry Writer + SA User)
#   NEXT_PUBLIC_APP_URL    — public HTTPS URL of the service (inlined at build time)
#
# All runtime secrets live in Google Secret Manager under the name on the right-hand side
# of each --set-secrets entry below. Grant the deploy SA `roles/secretmanager.secretAccessor`.

name: Deploy to Cloud Run

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGION: asia-southeast1
  REPOSITORY: onepost
  SERVICE: onepost

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build image
        run: |
          : "${PROJECT_ID:?GCP_PROJECT_ID secret is missing}"
          IMAGE_BASE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${SERVICE}"
          TAG_REF="${IMAGE_BASE}:${GITHUB_REF_NAME}"
          TAG_LATEST="${IMAGE_BASE}:latest"
          echo "Building ${TAG_REF}"
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL="${PUBLIC_URL}" \
            -t "${TAG_REF}" \
            -t "${TAG_LATEST}" \
            .
          echo "IMAGE_REF=${TAG_REF}"   >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=${TAG_LATEST}" >> "$GITHUB_ENV"

      - name: Push image
        run: |
          docker push "${IMAGE_REF}"
          docker push "${IMAGE_LATEST}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE_REF}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --timeout=900 \
            --memory=1Gi \
            --cpu=1 \
            --concurrency=80 \
            --min-instances=0 \
            --max-instances=4 \
            --set-env-vars "NEXT_PUBLIC_APP_URL=${PUBLIC_URL},NODE_ENV=production" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,DIRECT_URL=DIRECT_URL:latest,FACEBOOK_APP_ID=FACEBOOK_APP_ID:latest,FACEBOOK_APP_SECRET=FACEBOOK_APP_SECRET:latest,INSTAGRAM_APP_ID=INSTAGRAM_APP_ID:latest,INSTAGRAM_APP_SECRET=INSTAGRAM_APP_SECRET:latest,YOUTUBE_CLIENT_ID=YOUTUBE_CLIENT_ID:latest,YOUTUBE_CLIENT_SECRET=YOUTUBE_CLIENT_SECRET:latest,CLOUDINARY_CLOUD_NAME=CLOUDINARY_CLOUD_NAME:latest,CLOUDINARY_API_KEY=CLOUDINARY_API_KEY:latest,CLOUDINARY_API_SECRET=CLOUDINARY_API_SECRET:latest"

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe "${SERVICE}" --region "${REGION}" --format='value(status.url)')
          echo "### Deployed to ${URL}" >> "$GITHUB_STEP_SUMMARY"
