# Deploy to Cloud Run on tag push (e.g. `v1.0.0`).
#
# Required GitHub secrets:
#   GCP_PROJECT_ID         — e.g. "onepost-prod"
#   GCP_WIF_PROVIDER       — full WIF provider resource name, e.g.
#                            "projects/123456789/locations/global/workloadIdentityPools/github/providers/github"
#   GCP_SA_EMAIL           — deploy service account (Cloud Run Admin + Artifact Registry Writer + SA User)
#   NEXT_PUBLIC_APP_URL    — public HTTPS URL of the service (inlined at build time)
#
# All runtime secrets live in Google Secret Manager under the name on the right-hand side
# of each --set-secrets entry below. Grant the deploy SA `roles/secretmanager.secretAccessor`.
#
# One-time GCP setup:
#   gcloud artifacts repositories create onepost --repository-format=docker --location=$REGION
#   gcloud iam service-accounts create github-deployer --display-name="GitHub Deployer"
#   # grant roles/run.admin, roles/artifactregistry.writer, roles/iam.serviceAccountUser,
#   # roles/secretmanager.secretAccessor to the SA
#   # configure Workload Identity Federation (see https://github.com/google-github-actions/auth#setting-up-workload-identity-federation)

name: Deploy to Cloud Run

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGION: asia-southeast1
  REPOSITORY: onepost
  SERVICE: onepost

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${REPOSITORY}/${SERVICE}:${GITHUB_REF_NAME}"
          echo "ref=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL="${{ secrets.NEXT_PUBLIC_APP_URL }}" \
            -t "${{ steps.image.outputs.ref }}" \
            -t "${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${REPOSITORY}/${SERVICE}:latest" \
            .

      - name: Push image
        run: |
          docker push "${{ steps.image.outputs.ref }}"
          docker push "${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${REPOSITORY}/${SERVICE}:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --image "${{ steps.image.outputs.ref }}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --timeout=900 \
            --memory=1Gi \
            --cpu=1 \
            --concurrency=80 \
            --min-instances=0 \
            --max-instances=4 \
            --set-env-vars "NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }},NODE_ENV=production" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,DIRECT_URL=DIRECT_URL:latest,FACEBOOK_APP_ID=FACEBOOK_APP_ID:latest,FACEBOOK_APP_SECRET=FACEBOOK_APP_SECRET:latest,INSTAGRAM_APP_ID=INSTAGRAM_APP_ID:latest,INSTAGRAM_APP_SECRET=INSTAGRAM_APP_SECRET:latest,YOUTUBE_CLIENT_ID=YOUTUBE_CLIENT_ID:latest,YOUTUBE_CLIENT_SECRET=YOUTUBE_CLIENT_SECRET:latest,CLOUDINARY_CLOUD_NAME=CLOUDINARY_CLOUD_NAME:latest,CLOUDINARY_API_KEY=CLOUDINARY_API_KEY:latest,CLOUDINARY_API_SECRET=CLOUDINARY_API_SECRET:latest"

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe "${SERVICE}" --region "${REGION}" --format='value(status.url)')
          echo "### Deployed to ${URL}" >> "$GITHUB_STEP_SUMMARY"
